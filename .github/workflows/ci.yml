# This is a sample legacy CI Pipeline for Day 1 Analysis.
# Goal: Analyse this file and identify missing testing layers according to the Test Pyramid.

name: Legacy CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_application:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compile Code (No Tests)
        run: mvn compile -DskipTests
        
  # Note to participant: This skips straight to a mock deployment/E2E without unit/integration tests!
  deploy_to_staging_and_run_e2e:
    needs: build_application
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging Environment
        run: echo "Deploying V1.0 to staging servers..."

      - name: Run Slow End-to-End UI Tests
        run: echo "Executing Selenium E2E Suite... this takes 45 minutes!"
